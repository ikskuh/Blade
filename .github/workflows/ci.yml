name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install apt packages (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: just build-essential
          version: 1.0

      - name: Resolve flexspin HEAD
        id: flexspin-ref
        run: |
          set -euo pipefail
          FLEXSPIN_HEAD="$(git ls-remote https://github.com/totalspectrum/spin2cpp.git HEAD | cut -f1)"
          echo "head=$FLEXSPIN_HEAD" >> "$GITHUB_OUTPUT"

      - name: Restore flexspin cache
        id: flexspin-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/flexspin
          key: flexspin-${{ runner.os }}-${{ steps.flexspin-ref.outputs.head }}

      - name: Build flexspin
        if: steps.flexspin-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/spin2cpp
          git clone --depth 1 https://github.com/totalspectrum/spin2cpp.git /tmp/spin2cpp
          make -C /tmp/spin2cpp
          mkdir -p ~/.cache/flexspin/bin
          cp /tmp/spin2cpp/build/flexspin ~/.cache/flexspin/bin/flexspin
          cp /tmp/spin2cpp/build/flexcc ~/.cache/flexspin/bin/flexcc
          cp /tmp/spin2cpp/build/spin2cpp ~/.cache/flexspin/bin/spin2cpp

      - name: Add flexspin to PATH
        run: echo "$HOME/.cache/flexspin/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          dotnet --info
          just --version
          flexspin --version

      - name: just build
        run: just build

      - name: just test
        run: just test

      - name: just regressions
        run: just regressions

      - name: just coverage
        run: just coverage

      - name: Publish coverage summary to GitHub Actions
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          fail_below_min: true
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          thresholds: "90 98"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-coverage
          path: coverage/coverage.cobertura.xml
          if-no-files-found: error

      - name: Generate PR coverage comment
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "$BASE_REF"

          PR_COVERAGE_FILE="$RUNNER_TEMP/coverage-pr.xml"
          BASE_COVERAGE_FILE="$RUNNER_TEMP/coverage-base.xml"
          REPORT_FILE="$RUNNER_TEMP/coverage-report.md"
          BASE_WORKTREE="$RUNNER_TEMP/base-coverage"

          cp coverage/coverage.cobertura.xml "$PR_COVERAGE_FILE"

          BASE_AVAILABLE=true
          rm -rf "$BASE_WORKTREE"
          git worktree add --detach "$BASE_WORKTREE" "origin/$BASE_REF"
          if ! (cd "$BASE_WORKTREE" && just coverage); then
            BASE_AVAILABLE=false
          fi

          if [ "$BASE_AVAILABLE" = true ] && [ -f "$BASE_WORKTREE/coverage/coverage.cobertura.xml" ]; then
            cp "$BASE_WORKTREE/coverage/coverage.cobertura.xml" "$BASE_COVERAGE_FILE"
          else
            BASE_AVAILABLE=false
          fi

          git worktree remove "$BASE_WORKTREE" --force

          python Scripts/generate_pr_coverage_comment.py \
            --pr-coverage "$PR_COVERAGE_FILE" \
            --base-coverage "$BASE_COVERAGE_FILE" \
            --report "$REPORT_FILE" \
            --base-ref "$BASE_REF" \
            --base-available "$BASE_AVAILABLE"

          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
        id: coverage_comment

      - name: Post PR coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = process.env.REPORT_FILE;
            const body = fs.readFileSync(reportPath, 'utf8');
            const marker = '<!-- blade-coverage-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
        env:
          REPORT_FILE: ${{ steps.coverage_comment.outputs.report_file }}
